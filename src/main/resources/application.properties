# Server
server.port=${PORT:8080}

# App
spring.application.name=minicompiler-backend

# CORS — se sobreescribe por variable de entorno en producción
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.minicompiler=DEBUG
logging.level.org.springframework.web=INFO